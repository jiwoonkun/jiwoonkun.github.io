<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>수정하는 페이지</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        
        <header class="header">

                <p>저는 기계 구조를 파악하는 것을 좋아합니다...</p>
            </section>

            <section class="section-card">
                <h3>관심 분야</h3>
                <ul class="tag-list">
                    <li class="tag">도면 작성</li>
                    <li class="tag">조립</li>
                </ul>
            </section>

            <footer class="footer">
                <p>ⓒ 2026 Kwon Ji Woon</p>
            </footer>

</html>
